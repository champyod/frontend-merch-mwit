services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: merch_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d merch_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../API-Merch-MWIT
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=host=db user=postgres password=password dbname=merch_db port=5432 sslmode=disable
      - PORT=8080
      - NODE_ENV=development
      - FRONTEND_URL=http://localhost:3000
    env_file:
      - ../API-Merch-MWIT/.env.local
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://api:8080
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8080
    env_file:
      - .env.local
    depends_on:
      - api
